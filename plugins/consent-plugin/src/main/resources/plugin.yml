name: bnb-consent
version: 1.0.0
main: org.gobitsnbytes.minecraft.consent.ConsentPlugin
api-version: '1.21'
description: Enforces acceptance of Foundation rules before gameplay.
author: bits&bytes
commands:
  accept:
    description: Accept the server rules and terms.
    usage: /accept
  rules:
    description: Show the server rules and terms.
    usage: /rules
permissions:
  bnb.consent.bypass:
    description: Bypass the consent gate.
    default: op

